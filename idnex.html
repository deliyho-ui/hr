<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HR-AI | דמו מערכת גיוס</title>
  <style>
    :root {
      --bg: #f5f7fa;
      --surface: #ffffff;
      --surface-soft: #f9fafb;
      --ink: #172033;
      --muted: #677084;
      --line: #dfe5ee;
      --line-strong: #c8d1df;
      --primary: #155e75;
      --primary-2: #0f766e;
      --accent: #2563eb;
      --green: #15803d;
      --green-bg: #eaf8ef;
      --orange: #b45309;
      --orange-bg: #fff4e5;
      --gray: #596273;
      --gray-bg: #eef1f5;
      --red: #b42318;
      --red-bg: #fff0ed;
      --shadow: 0 18px 45px rgba(23, 32, 51, 0.08);
      --radius: 8px;
      --focus: 0 0 0 3px rgba(37, 99, 235, 0.22);
      font-family: "Inter", "Segoe UI", Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100dvh;
      background: var(--bg);
      color: var(--ink);
      font-size: 16px;
      line-height: 1.5;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button:focus-visible,
    input:focus-visible,
    select:focus-visible,
    textarea:focus-visible,
    [tabindex]:focus-visible {
      outline: none;
      box-shadow: var(--focus);
    }

    .app {
      display: grid;
      grid-template-columns: 260px minmax(0, 1fr);
      min-height: 100dvh;
    }

    .sidebar {
      position: sticky;
      top: 0;
      height: 100dvh;
      padding: 24px 18px;
      background: #101828;
      color: #f8fafc;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 4px 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.12);
    }

    .brand-mark {
      width: 44px;
      height: 44px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: #ecfeff;
      color: #155e75;
      font-weight: 800;
      letter-spacing: 0;
    }

    .brand-title {
